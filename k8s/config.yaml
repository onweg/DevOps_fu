# =============================================================================
# Система обнаружения несанкционированного доступа — Kubernetes manifests
#
# Single-pod deployment: 4 containers share localhost.
# Apply:  kubectl apply -f k8s/config.yaml
# Delete: kubectl delete -f k8s/config.yaml
# =============================================================================

# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: access-security

---
# ── ConfigMap — non-sensitive config ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: access-config
  namespace: access-security
data:
  POSTGRES_DB:     "access_security"
  POSTGRES_USER:   "secuser"
  FLASK_ENV:       "production"
  ML_TIMEOUT_SEC:  "120"
  ML_SERVICE_URL:  "http://localhost:5001"
  MODEL_DIR:       "/app/models"

---
# ── ConfigMap — PostgreSQL init SQL ──────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: access-security
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS access_events (
        id         SERIAL PRIMARY KEY,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        request_rate_per_min        FLOAT    NOT NULL,
        failed_auth_count           FLOAT    NOT NULL,
        token_age_hours             FLOAT    NOT NULL,
        is_known_service            SMALLINT NOT NULL CHECK (is_known_service    IN (0, 1)),
        service_id                  SMALLINT NOT NULL,
        oauth_scope_count           FLOAT    NOT NULL,
        api_key_age_days            FLOAT    NOT NULL,
        ssl_valid                   SMALLINT NOT NULL CHECK (ssl_valid           IN (0, 1)),
        session_duration_sec        FLOAT    NOT NULL,
        unique_endpoints_count      FLOAT    NOT NULL,
        concurrent_sessions         SMALLINT NOT NULL,
        off_hours_access            SMALLINT NOT NULL CHECK (off_hours_access    IN (0, 1)),
        permission_escalation_count FLOAT    NOT NULL,
        token_refresh_count         FLOAT    NOT NULL,
        redirect_count              FLOAT    NOT NULL,
        is_known_ip                 SMALLINT NOT NULL CHECK (is_known_ip         IN (0, 1)),
        ip_change_count             FLOAT    NOT NULL,
        geolocation_anomaly         SMALLINT NOT NULL CHECK (geolocation_anomaly IN (0, 1)),
        response_error_rate         FLOAT    NOT NULL CHECK (response_error_rate BETWEEN 0 AND 1),
        data_volume_mb              FLOAT    NOT NULL,
        request_size_avg_bytes      FLOAT    NOT NULL,
        anomaly_score_prev          FLOAT    NOT NULL,
        label      SMALLINT    NOT NULL CHECK (label BETWEEN 0 AND 5),
        label_name VARCHAR(30) NOT NULL
    );
    CREATE TABLE IF NOT EXISTS threat_detections (
        id          SERIAL PRIMARY KEY,
        detected_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        event_id    INTEGER NOT NULL REFERENCES access_events (id) ON DELETE CASCADE,
        gb_label       SMALLINT    NOT NULL,
        gb_label_name  VARCHAR(30) NOT NULL,
        mlp_label      SMALLINT    NOT NULL,
        mlp_label_name VARCHAR(30) NOT NULL,
        km_label       SMALLINT    NOT NULL,
        km_label_name  VARCHAR(30) NOT NULL,
        final_label      SMALLINT    NOT NULL,
        final_label_name VARCHAR(30) NOT NULL,
        confidence      FLOAT   NOT NULL CHECK (confidence BETWEEN 0.0 AND 1.0),
        model_agreement BOOLEAN NOT NULL DEFAULT FALSE
    );
    CREATE TABLE IF NOT EXISTS model_metrics (
        id         SERIAL PRIMARY KEY,
        trained_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        model_name       VARCHAR(30) NOT NULL,
        training_samples INTEGER     NOT NULL,
        test_samples     INTEGER     NOT NULL,
        accuracy        FLOAT NOT NULL,
        precision_macro FLOAT NOT NULL,
        recall_macro    FLOAT NOT NULL,
        f1_macro        FLOAT NOT NULL,
        confusion_matrix JSONB NOT NULL DEFAULT '[]',
        class_report     JSONB NOT NULL DEFAULT '{}'
    );
    CREATE TABLE IF NOT EXISTS trusted_services (
        id          SERIAL PRIMARY KEY,
        added_at    TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        service_name VARCHAR(64)  NOT NULL,
        service_id   SMALLINT     NOT NULL,
        service_url  VARCHAR(256),
        description  TEXT,
        is_active    BOOLEAN      NOT NULL DEFAULT TRUE,
        CONSTRAINT uq_service_name UNIQUE (service_name)
    );
    CREATE TABLE IF NOT EXISTS activity_logs (
        id         SERIAL PRIMARY KEY,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        level   VARCHAR(10) NOT NULL CHECK (level IN ('INFO','WARNING','ALERT','ERROR')),
        action  VARCHAR(50) NOT NULL,
        message TEXT        NOT NULL,
        details JSONB       NOT NULL DEFAULT '{}'
    );
    CREATE TABLE IF NOT EXISTS alerts (
        id         SERIAL PRIMARY KEY,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        threat_type VARCHAR(30) NOT NULL,
        severity    VARCHAR(10) NOT NULL CHECK (severity IN ('LOW','MEDIUM','HIGH','CRITICAL')),
        event_id     INTEGER REFERENCES access_events    (id) ON DELETE SET NULL,
        detection_id INTEGER REFERENCES threat_detections (id) ON DELETE SET NULL,
        message    TEXT  NOT NULL,
        confidence FLOAT NOT NULL CHECK (confidence BETWEEN 0.0 AND 1.0),
        acknowledged    BOOLEAN                  NOT NULL DEFAULT FALSE,
        acknowledged_at TIMESTAMP WITH TIME ZONE
    );
    CREATE INDEX IF NOT EXISTS idx_events_label      ON access_events (label);
    CREATE INDEX IF NOT EXISTS idx_events_label_name ON access_events (label_name);
    CREATE INDEX IF NOT EXISTS idx_events_created_at ON access_events (created_at DESC);
    CREATE INDEX IF NOT EXISTS idx_det_event_id      ON threat_detections (event_id);
    CREATE INDEX IF NOT EXISTS idx_det_label         ON threat_detections (final_label_name);
    CREATE INDEX IF NOT EXISTS idx_det_conf          ON threat_detections (confidence DESC);
    CREATE INDEX IF NOT EXISTS idx_metrics_model     ON model_metrics (model_name, trained_at DESC);
    CREATE INDEX IF NOT EXISTS idx_alerts_active     ON alerts (acknowledged, created_at DESC);
    CREATE INDEX IF NOT EXISTS idx_logs_level        ON activity_logs (level, created_at DESC);
    INSERT INTO trusted_services (service_name, service_id, service_url, description) VALUES
        ('Google OAuth 2.0', 0, 'https://oauth2.googleapis.com',  'Google identity provider'),
        ('GitHub OAuth',     1, 'https://github.com/login/oauth', 'GitHub OAuth integration'),
        ('Stripe API',       2, 'https://api.stripe.com',         'Payment processing'),
        ('SendGrid',         3, 'https://api.sendgrid.com',       'Transactional email'),
        ('Twilio',           4, 'https://api.twilio.com',         'SMS notifications')
    ON CONFLICT (service_name) DO NOTHING;
    INSERT INTO activity_logs (level, action, message) VALUES
        ('INFO', 'DB_INITIALIZED', 'Database schema created and seed data loaded');

---
# ── Secret ────────────────────────────────────────────────────────────────────
# Values are base64-encoded. Defaults: securepass123 / admin@admin.com / pgadminpass
# Regenerate: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: access-secret
  namespace: access-security
type: Opaque
data:
  POSTGRES_PASSWORD:        c2VjdXJlcGFzczEyMw==   # securepass123
  PGADMIN_DEFAULT_EMAIL:    YWRtaW5AYWRtaW4uY29t   # admin@admin.com
  PGADMIN_DEFAULT_PASSWORD: cGdhZG1pbnBhc3M=        # pgadminpass

---
# ── PVC — PostgreSQL data ─────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: access-security
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ── PVC — ML model files ──────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: access-security
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi

---
# ── PVC — pgAdmin data ────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-pvc
  namespace: access-security
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi

---
# ── Deployment — 1 pod, 4 containers ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-security
  namespace: access-security
  labels:
    app: access-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: access-security
  template:
    metadata:
      labels:
        app: access-security
    spec:
      containers:

        # ── 1. PostgreSQL ─────────────────────────────────────────────────────
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: access-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: access-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: access-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "secuser", "-d", "access_security"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

        # ── 2. ML service ─────────────────────────────────────────────────────
        - name: ml-service
          image: access-ml-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: access-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://secuser:$(POSTGRES_PASSWORD)@localhost:5432/access_security"
            - name: MODEL_DIR
              valueFrom:
                configMapKeyRef:
                  name: access-config
                  key: MODEL_DIR
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: access-config
                  key: FLASK_ENV
          ports:
            - containerPort: 5001
          volumeMounts:
            - name: ml-models
              mountPath: /app/models
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5

        # ── 3. Flask API ──────────────────────────────────────────────────────
        - name: api
          image: access-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: access-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://secuser:$(POSTGRES_PASSWORD)@localhost:5432/access_security"
            - name: ML_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: access-config
                  key: ML_SERVICE_URL
            - name: ML_TIMEOUT_SEC
              valueFrom:
                configMapKeyRef:
                  name: access-config
                  key: ML_TIMEOUT_SEC
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: access-config
                  key: FLASK_ENV
          ports:
            - containerPort: 5000

        # ── 4. pgAdmin ────────────────────────────────────────────────────────
        - name: pgadmin
          image: dpage/pgadmin4:8
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: access-secret
                  key: PGADMIN_DEFAULT_EMAIL
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: access-secret
                  key: PGADMIN_DEFAULT_PASSWORD
          ports:
            - containerPort: 80
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-init
          configMap:
            name: postgres-init-sql
        - name: ml-models
          persistentVolumeClaim:
            claimName: ml-models-pvc
        - name: pgadmin-data
          persistentVolumeClaim:
            claimName: pgadmin-pvc

---
# ── Service — Flask API (NodePort :30000) ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: access-api-svc
  namespace: access-security
spec:
  type: NodePort
  selector:
    app: access-security
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30000

---
# ── Service — pgAdmin (NodePort :30080) ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: access-pgadmin-svc
  namespace: access-security
spec:
  type: NodePort
  selector:
    app: access-security
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
